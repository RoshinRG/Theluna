<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna's World — Verses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    /* ── Discreet Palette ──────────────────────────────────────────────────── */
    :root {
      --accent: #845EC2;
      --accent-dim: rgba(132, 94, 194, 0.35);
      --bg-deep: #4B4453;
      --bg-deeper: #221f28;
      --panel: #9B89B3;
      --muted: #B0A8B9;
      --page-light: #FEF7FF;
      --page-warm: #D5CABD;
      --ink: #2a2620;
      --ink-soft: #4B4453;
      --spine: #221f28;
      --text-light: #FEF7FF;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(ellipse at center, var(--bg-deep) 0%, var(--bg-deeper) 100%);
      color: var(--text-light);
      font-family: 'EB Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* prefers-reduced-motion: allow scrolling, no overflow:hidden trick needed */
    @media (prefers-reduced-motion: reduce) {

      html,
      body {
        overflow: auto;
      }
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .scene {
      position: relative;
      z-index: 1;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ──────────────────────────── Grid view ──────────────────────────────── */
    #grid-view {
      width: min(1040px, 92vw);
      max-height: 88vh;
      overflow-y: auto;
      padding: 40px 10px 60px;
      scrollbar-width: thin;
      scrollbar-color: rgba(132, 94, 194, 0.3) transparent;
    }

    #grid-view::-webkit-scrollbar {
      width: 5px;
    }

    #grid-view::-webkit-scrollbar-thumb {
      background: rgba(132, 94, 194, 0.3);
      border-radius: 4px;
    }

    .grid-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: .35em;
      color: var(--accent);
      text-transform: uppercase;
      opacity: .85;
    }

    .grid-header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 46px;
      margin: 8px 0 6px;
      letter-spacing: .02em;
      color: var(--text-light);
    }

    .grid-header p {
      color: var(--muted);
      font-size: 15px;
      font-style: italic;
      margin: 0;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 22px;
      margin-top: 40px;
    }

    .poem-card {
      position: relative;
      background: linear-gradient(160deg, rgba(155, 137, 179, 0.08), rgba(155, 137, 179, 0.03));
      border: 1px solid rgba(155, 137, 179, 0.25);
      border-radius: 2px;
      padding: 22px 20px 26px;
      cursor: pointer;
      transition: transform .35s ease, border-color .35s ease, box-shadow .35s ease;
    }

    .poem-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px -12px rgba(132, 94, 194, 0.35);
    }

    .poem-card .num {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--accent);
      opacity: .8;
    }

    .poem-card h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      margin: 10px 0 10px;
      line-height: 1.25;
      color: var(--text-light);
    }

    .poem-card .teaser {
      font-size: 13.5px;
      color: var(--panel);
      font-style: italic;
      line-height: 1.5;
    }

    .poem-card .glyph {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 22px;
      height: 22px;
      opacity: .7;
    }

    /* ──────────────────────────── Book view ──────────────────────────────── */
    #book-view {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .book-wrap {
      perspective: 2600px;
      width: min(900px, 90vw);
      height: min(572px, 74vh);
      position: relative;
    }

    .book-shell {
      position: absolute;
      inset: 0;
      display: flex;
      border-radius: 4px;
      box-shadow:
        0 50px 100px -20px rgba(34, 31, 40, 0.85),
        0 0 0 1px rgba(176, 168, 185, 0.1);
      background: var(--spine);
    }

    /* Left page — warm parchment */
    .page-static {
      width: 50%;
      height: 100%;
      background:
        radial-gradient(130% 150% at 0% 0%, rgba(34, 31, 40, 0.18), transparent 55%),
        linear-gradient(90deg, rgba(34, 31, 40, 0.22), transparent 7%),
        var(--page-warm);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 44px 36px;
    }

    .page-static.left {
      border-radius: 4px 0 0 4px;
    }

    .page-static .num {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: .3em;
      color: var(--ink-soft);
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: .75;
    }

    .page-static h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 16px;
      line-height: 1.2;
    }

    .moon-glyph {
      width: 64px;
      height: 64px;
      margin-bottom: 22px;
      opacity: .9;
    }

    .page-static .flourish {
      width: 60px;
      height: 1px;
      background: var(--ink-soft);
      opacity: .35;
      margin-top: 20px;
    }

    /* Flip zone — right page */
    .flip-zone {
      width: 50%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    /* Right (flip) page — light moonlit paper */
    .flip-page {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(130% 150% at 100% 0%, rgba(34, 31, 40, 0.10), transparent 55%),
        linear-gradient(270deg, rgba(34, 31, 40, 0.10), transparent 7%),
        var(--page-light);
      border-radius: 0 4px 4px 0;
      backface-visibility: hidden;
      transform-origin: left center;
      transform: rotateY(0deg);
      transition: transform .85s cubic-bezier(.65, 0, .35, 1);
      padding: 42px 42px 42px 38px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .flip-page.turning {
      transform: rotateY(-178deg);
    }

    /* prefers-reduced-motion: crossfade instead of flip */
    @media (prefers-reduced-motion: reduce) {
      .flip-page {
        transition: opacity .3s ease;
        transform: rotateY(0deg) !important;
      }

      .flip-page.turning {
        opacity: 0;
        transform: rotateY(0deg) !important;
      }
    }

    .flip-page::-webkit-scrollbar {
      width: 5px;
    }

    .flip-page::-webkit-scrollbar-thumb {
      background: rgba(75, 68, 83, 0.2);
      border-radius: 4px;
    }

    /* Poem body */
    .poem-body p {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16.5px;
      line-height: 1.88;
      color: var(--ink);
      margin: 0 0 14px;
      white-space: pre-wrap;
    }

    .poem-body .dropcap {
      float: left;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 56px;
      line-height: .78;
      padding: 8px 10px 0 0;
      color: var(--accent);
      font-weight: 600;
    }

    /* Spine shadow */
    .spine-shadow {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 38px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(34, 31, 40, 0.40), transparent);
      pointer-events: none;
      z-index: 5;
    }

    /* ──────────────────────────── Controls ───────────────────────────────── */
    .book-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 26px;
      margin-top: 26px;
      font-family: 'Inter', sans-serif;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--muted);
      color: var(--text-light);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .25s, color .25s, transform .2s;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .nav-btn:disabled {
      opacity: .25;
      cursor: default;
    }

    .page-index {
      font-size: 12px;
      letter-spacing: .22em;
      color: var(--muted);
      text-transform: uppercase;
      min-width: 90px;
      text-align: center;
    }

    .close-btn {
      position: absolute;
      top: 26px;
      right: 34px;
      background: none;
      border: none;
      color: var(--panel);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: .15em;
      cursor: pointer;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color .2s;
    }

    .close-btn:hover {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <canvas id="stars"></canvas>

  <div class="scene">

    <!-- ═══════════════════ GRID VIEW ═══════════════════ -->
    <div id="grid-view">
      <div class="grid-header">
        <div class="eyebrow">Luna's World · Collected Entries</div>
        <h1>Verses Left on the Windowsill</h1>
        <p>Five small pages. Click one to open the book.</p>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </div>

    <!-- ═══════════════════ BOOK VIEW ═══════════════════ -->
    <div id="book-view">
      <button type="button" class="close-btn" id="closeBtn">✕ Close book</button>
      <div class="book-wrap">
        <div class="book-shell">
          <div class="page-static left" id="leftPage"></div>
          <div class="flip-zone">
            <div class="flip-page" id="flipPage"></div>
          </div>
          <div class="spine-shadow"></div>
        </div>
      </div>
      <div class="book-controls">
        <button type="button" class="nav-btn" id="prevBtn" aria-label="Previous poem">‹</button>
        <div class="page-index" id="pageIndex"></div>
        <button type="button" class="nav-btn" id="nextBtn" aria-label="Next poem">›</button>
      </div>
    </div>

  </div>

  <script>
    /* ══════════════════════════════════════════════════════════════════════════
       Poem data — original text preserved exactly
    ══════════════════════════════════════════════════════════════════════════ */
    const poems = [
      {
        title: "Warmth That Burned",
        glyph: "crescent",
        body: `The light had finally found its way to that soul.
She lived within a cage, unaware of the sword she was destined to wield. Her eyes still gleamed with innocence when the clock struck twelve.
And then, the rain clouds parted.
A silver light revealed itself to the moon. It was beautiful, yet cold. The cold settled along her spine like winter's fingers.
Just as the tides answered the moon's call, she answered the call of a place she hoped would finally grant her solace.
But she was cursed.
Her blood belonged to the stars, and her soul was made of glass and dust.
Her comfort had vanished. So had her smile.
Far in the distance, a small light flickered. A firefly, she thought.
And for the first time in a long while, she allowed herself to believe in goodness.
Guided by moonlight, she followed it into the woods.
The deeper she wandered, the thicker the forest became.
Then she saw it. Not a firefly. A wildfire.
The closer she stepped, the heavier the smoke became. It filled her lungs and stole her breath. Her face turned pale, her eyes burned with tears.
Yet hidden beside the raging flames stood a small bonfire.
Its warmth was gentle. Enough to comfort her. Not enough to consume her.
Above, the moon shone brighter than ever, though smoke and clouds veiled its light, much like grief veils the heart.
She stood between two fires. One that could warm her. One that could destroy her.
She did not know which she truly needed. Something to quench her thirst. Or something that would leave her completely dry.
Lost between her thoughts, she slowly lost herself. That hollow feeling returned. It weakened her heart until it became quiet.
One choice would decide her sky.
Time moved too quickly as she wavered between paths. That terrible feeling, when the heart wants one thing, yet the soul knows it cannot survive it.
Her heart was adorned with needles now. Wrapped in thorns. The air became harder to breathe. And there was no turning back.
The path behind her had closed. The sky had darkened. The fire only burned brighter, believing she would choose it.
Little did it know, it had hurt her every single time.
She fell to her knees and prayed for rain. The girl who once longed for warmth now begged for coldness. For emptiness. For relief.
She stared at her burned hands. At her scarred skin. And whispered;
Perhaps I should never have come here. Perhaps I was never meant to feel warmth. Perhaps I do not deserve it. Perhaps this is simply too much.
The bonfire dimmed as it witnessed her tears. The wildfire did not.
"Why aren't you choosing me?" it asked.
"You are too much for me," she replied. And turned away.
Only then did the wildfire truly see her scars. See what its flames had done. See how much she had suffered.
"Sorry—"
But before the apology could reach her, she collapsed.
The fire lost control. It rushed toward her from every direction, surrounding her completely. And it burned her alive.
Thus ended a noble soul. A soul who only wished to become someone worth looking up to. A soul who searched endlessly for the warmth she had always lacked.
Perhaps, in another life, the fire would not consume her. Perhaps it would heal her frostbitten hands. Guide her through her darkest nights. And teach her that warmth was never meant to hurt.
Leaving the final page blank, just in case…`
      },
      {
        title: "Whispers of the Earth",
        glyph: "gibbous",
        body: `The first time the wind whispered my name, I thought it was lying.
No one speaks to girls like me. Not anymore. Not in a world where rivers are bought and bottled, and the sky is just a faded ceiling no one looks at.
But the truth is: I was born remembering.
The trees still whispered to me. And they had not forgotten what the world chose to erase.
But that morning on the fourth day of Ember Season I felt it. The earth shivered under my bare feet. And I heard it again.
Lyra.
The voice came from the roots.
I live in a place they call the Hollow. It's the last patch of land they haven't burned or built over.
They left it alone because it scared them. Because here, the air still remembers.
They say the world died years ago. That climate change swallowed the oceans, cracked the soil, and ruined every chance we had.
But that's not true. The world didn't die. It simply stopped talking to us. Until now.
I don't know why the Hollow chose me. Maybe because I listen. Maybe because when I close my eyes, I can feel the ghosts of extinct birds nesting in my ribcage.
My grandmother once told me, "When the trees remember your name, child, it means you're part of their last story."
So I waited. And the Hollow showed me what they buried.
Beneath the moss, under the cracked bark of an ancient oak, I found it: a library made of soil. Each leaf held a memory. Each root, a name.
The oceans, once blue, cried through the stones.
There were no heroes here. No shining machines. Just a girl with scars on her palms and questions on her tongue.
I asked the wind why the world turned away from us. And it said:
Because you traded your skies for smoke. Your rivers for noise. Your truth for progress.
And then it asked me something I didn't expect. It asked me to give up my voice. To offer the one thing I still had — belief. Belief that this Earth still wants us. Still aches for us. Still waits.
I knelt down. I pressed my hand to the roots. And I whispered:
I remember you.
The trees wept. The sky cracked open. And for the first time in centuries, the soil sighed in relief.
I didn't save the world. I simply reminded it of who we used to be.`
      },
      {
        title: "Mellow Glow From Within",
        glyph: "full",
        body: `The stars did not guide her. They simply watched as she learned to glow on her own.
The stars within her guided her. They did not speak, nor did they interfere. They simply watched quietly as she learned to glow on her own.
Most stars do not carry their own light. They reflect what is given to them, borrowing brilliance from something greater.
But when everything around her turned dark, she chose differently.
She did not search for light to reflect. She did not wait for the sun. Instead, she created her own.
A glow that did not depend on anything — a light that did not fade with the absence of others.
It was softer at first, almost fragile, but it grew, day by day, stronger than anything she had ever known.
Even the stars seemed to pause, watching her in quiet awe, wondering how she continued to shine without borrowing anyone's fire.
She became her own sun. Her own galaxy.
And with that quiet, unwavering glow, she walked forward toward her destiny.`
      },
      {
        title: "Scars That Shine",
        glyph: "crescent-r",
        body: `The moon hung low with quiet secrets that only she could hear.
There is an ease in the sky — a scarred star that still shines.
The sun burns bright, but the moon hums with secrets, soft and unspoken, meant only for those who truly observe.
It is not loud. It does not call for attention. Only she could hear it — not with her ears, but with something deeper.
The moon appears when the world slows down, becoming a quiet companion to those who seek silence rather than sound.
It shines with the stars, reminding us that even something distant, something scarred, can still glow with grace.
She saw herself in the moon. Sometimes clearly, sometimes not at all. But she always found comfort in its scars.
The moon never spoke aloud, yet she heard it with her heart.`
      },
      {
        title: "A Love That Was Never Heard",
        glyph: "new",
        body: `She kept looking at the silent space, hoping it would speak her name.
She laughed with the world, but when he appeared, her voice faded into quiet. As if her existence softened in his presence.
She heard his heart belonged elsewhere. And something within her dimmed, like a star losing its light.
He never knew there was a girl who quietly shaped herself around his existence, willing to change even the smallest parts of her world just to feel closer to him.
She built galaxies in her mind, filled with moments that only existed in her imagination.
Somewhere, the one he loved would live those moments, without ever knowing they once belonged to her dreams.
Even the things she feared, even the things that unsettled her, she would have faced them, if it meant standing beside him.
Somewhere along the way, her feelings had started to depend on him for meaning.
And so, she remained a distant star — unseen, unspoken — loving him from a universe he would never look back at.`
      }
    ];

    /* ══════════════════════════════════════════════════════════════════════════
       Moon glyph SVG — phase variants
       bgColor is needed for the gibbous "cut-out" circle background
    ══════════════════════════════════════════════════════════════════════════ */
    function moonSVG(kind, fgColor, bgColor) {
      const fg = fgColor || '#845EC2';
      const bg = bgColor || '#D5CABD';   // default = warm left page
      const paths = {
        'new': `<circle cx="32" cy="32" r="26" fill="none" stroke="${fg}" stroke-width="1.6"/>`,
        'crescent': `<path d="M32 6a26 26 0 1 0 0 52 20 20 0 0 1 0-52Z" fill="${fg}"/>`,
        'crescent-r': `<path d="M32 6a26 26 0 1 1 0 52 20 20 0 0 0 0-52Z" fill="${fg}"/>`,
        'gibbous': `<circle cx="32" cy="32" r="26" fill="${fg}"/><circle cx="20" cy="32" r="22" fill="${bg}"/>`,
        'full': `<circle cx="32" cy="32" r="26" fill="${fg}"/>`
      };
      return `<svg class="moon-glyph" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${paths[kind] || paths.full}</svg>`;
    }

    /* Small inline SVG for the card glyphs (uses card bg as gibbous cutout) */
    function cardGlyphSVG(kind) {
      const fg = '#845EC2';
      // Cards have a near-transparent dark bg — use the deep bg color as cutout
      const bg = '#2e2836';
      const paths = {
        'new': `<circle cx="10" cy="10" r="8" fill="none" stroke="${fg}" stroke-width="1.4"/>`,
        'crescent': `<path d="M10 2a8 8 0 1 0 0 16 6 6 0 0 1 0-16Z" fill="${fg}"/>`,
        'crescent-r': `<path d="M10 2a8 8 0 1 1 0 16 6 6 0 0 0 0-16Z" fill="${fg}"/>`,
        'gibbous': `<circle cx="10" cy="10" r="8" fill="${fg}"/><circle cx="6" cy="10" r="7" fill="${bg}"/>`,
        'full': `<circle cx="10" cy="10" r="8" fill="${fg}"/>`
      };
      return `<svg class="moon-glyph" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${paths[kind] || paths.full}</svg>`;
    }

    /* ══════════════════════════════════════════════════════════════════════════
       Build card grid
    ══════════════════════════════════════════════════════════════════════════ */
    const grid = document.getElementById('card-grid');
    poems.forEach((p, i) => {
      const firstLine = p.body.trim().split('\n')[0];
      const card = document.createElement('div');
      card.className = 'poem-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Open poem: ${p.title}`);
      card.innerHTML = `
    <div class="glyph">${cardGlyphSVG(p.glyph)}</div>
    <div class="num">Entry ${String(i + 1).padStart(2, '0')}</div>
    <h3>${p.title}</h3>
    <div class="teaser">${firstLine}</div>
  `;
      card.addEventListener('click', () => openBook(i));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openBook(i); });
      grid.appendChild(card);
    });

    /* ══════════════════════════════════════════════════════════════════════════
       Book state
    ══════════════════════════════════════════════════════════════════════════ */
    const PRM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let current = 0;
    let animating = false;

    const gridView = document.getElementById('grid-view');
    const bookView = document.getElementById('book-view');
    const leftPage = document.getElementById('leftPage');
    const flipPage = document.getElementById('flipPage');
    const pageIndex = document.getElementById('pageIndex');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const closeBtn = document.getElementById('closeBtn');

    function renderSpread(i) {
      const p = poems[i];

      /* Left page — warm background, accent glyph */
      leftPage.innerHTML = `
    <div class="num">Entry ${String(i + 1).padStart(2, '0')} of ${poems.length}</div>
    ${moonSVG(p.glyph, '#845EC2', '#D5CABD')}
    <h2>${p.title}</h2>
    <div class="flourish"></div>
  `;

      /* Right (flip) page — drop cap in accent */
      const firstChar = p.body.trim()[0];
      const rest = p.body.trim().slice(1);
      flipPage.innerHTML = `<div class="poem-body"><p><span class="dropcap">${firstChar}</span>${rest}</p></div>`;
      flipPage.scrollTop = 0;

      pageIndex.textContent = `Page ${i + 1} / ${poems.length}`;
      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === poems.length - 1;
    }

    function openBook(i) {
      current = i;
      renderSpread(current);
      gridView.style.display = 'none';
      bookView.style.display = 'flex';
      closeBtn.focus();
    }

    function closeBook() {
      bookView.style.display = 'none';
      gridView.style.display = 'block';
    }

    /* ── Page-turn mechanic ──────────────────────────────────────────────────
       Uses transitionend (not setTimeout) so it's never timing-dependent.
       For prefers-reduced-motion: opacity crossfade instead of rotateY.
    ──────────────────────────────────────────────────────────────────────── */
    function turn(dir) {
      if (animating) return;
      const next = current + dir;
      if (next < 0 || next >= poems.length) return;

      animating = true;
      flipPage.classList.add('turning');

      function onTurnEnd() {
        flipPage.removeEventListener('transitionend', onTurnEnd);
        current = next;
        renderSpread(current);
        flipPage.classList.remove('turning');
        // Force reflow so next flip starts from rotateY(0) cleanly
        void flipPage.offsetWidth;
        animating = false;
      }

      flipPage.addEventListener('transitionend', onTurnEnd, { once: true });
    }

    closeBtn.addEventListener('click', closeBook);
    prevBtn.addEventListener('click', () => turn(-1));
    nextBtn.addEventListener('click', () => turn(1));

    /* Keyboard navigation inside book */
    document.addEventListener('keydown', e => {
      if (bookView.style.display === 'flex') {
        if (e.key === 'ArrowRight') turn(1);
        if (e.key === 'ArrowLeft') turn(-1);
        if (e.key === 'Escape') closeBook();
      }
    });

    /* ══════════════════════════════════════════════════════════════════════════
       Ambient starfield — plum-tinted stars to match the Discreet Palette
    ══════════════════════════════════════════════════════════════════════════ */
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    addEventListener('resize', resize);

    const stars = Array.from({ length: 130 }, () => ({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: Math.random() * 1.3 + 0.3,
      s: Math.random() * 0.018 + 0.004,
      p: Math.random() * Math.PI * 2
    }));

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(st => {
        st.p += st.s;
        const alpha = 0.3 + Math.sin(st.p) * 0.3;
        ctx.beginPath();
        ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
        // Slightly warm/plum-tinted star color instead of cold blue
        ctx.fillStyle = `rgba(210,200,230,${Math.max(0, alpha)})`;
        ctx.fill();
      });
      if (!PRM) requestAnimationFrame(loop);
    }

    if (!PRM) loop();
  </script>
</body>

</html>
